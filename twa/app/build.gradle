plugins {
    id 'com.android.application'
}

android {
    namespace 'com.xiyue.notes'
    compileSdk 34

    defaultConfig {
        applicationId 'com.xiyue.notes'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0.0'
    }

    signingConfigs {
        release {
            storeFile file('../release.keystore')
            storePassword 'xiyuenotes'
            keyAlias 'xiuye'
            keyPassword 'xiyuenotes'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // AndroidX Activity for ActivityResultLauncher (file picker)
    implementation('androidx.activity:activity:1.8.0') {
        exclude group: 'org.jetbrains.kotlin'
    }
    // AndroidX WebKit for WebViewAssetLoader (local asset serving via https://)
    implementation('androidx.webkit:webkit:1.9.0') {
        exclude group: 'org.jetbrains.kotlin'
    }
}
