<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>曦月笔记 - 跳转中...</title>
  <script>
    // GitHub Pages SPA 回退：将路径存入 sessionStorage，重定向到首页
    (function() {
      var repo = '/DawnMoonNotes';
      var path = location.pathname.replace(new RegExp('^' + repo), '') || '/';
      var fullPath = path + location.search + location.hash;
      sessionStorage.setItem('gh-redirect', fullPath);
      location.replace(repo + '/');
    })();
  </script>
</head>
<body></body>
</html>
