name: Build Android APK

on:
  workflow_dispatch:  # 改为手动触发，方便调试

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 准备 Android SDK
        run: |
          sudo apt-get install -y expect
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          echo "ANDROID_HOME=$ANDROID_HOME"

      - name: 安装 Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: 构建 APK（非交互模式）
        run: |
          cd twa
          # 创建临时 expect 脚本绕过交互提示
          cat > /tmp/build.exp << 'EXPECTEOF'
          #!/usr/bin/expect -f
          set timeout 300
          spawn bubblewrap build
          expect {
            "install the JDK" { send "n\r"; exp_continue }
            "install the Android SDK" { send "n\r"; exp_continue }
            "Path to your existing" { send "$env(ANDROID_HOME)\r"; exp_continue }
            eof
          }
          catch wait result
          exit [lindex $result 3]
          EXPECTEOF
          chmod +x /tmp/build.exp
          /tmp/build.exp

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: xiyue-notes-apk
          path: twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
