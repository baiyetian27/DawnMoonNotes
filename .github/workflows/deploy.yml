name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# 允许写入 gh-pages 分支 + 管理 Pages 设置
permissions:
  contents: write
  administration: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build
        env:
          VITE_BASE: /DawnMoonNotes/

      - name: 部署到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: 启用 GitHub Pages
        if: success()
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/baiyetian27/DawnMoonNotes/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'
